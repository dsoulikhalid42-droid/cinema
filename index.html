<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U4films - Watch Free Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header class="navbar" id="navbar">
        <div class="nav-left">
            <button class="hamburger"><i class="fas fa-bars"></i></button>
            <a href="#home" class="logo"><span class="logo-accent">U4</span>FILMS</a>
        </div>
        
        <!-- Desktop Search Bar (Centered) -->
        <div class="nav-center">
            <form id="search-form-desktop" class="search-box-desktop">
                <input type="text" id="search-input-desktop" placeholder="Search movies..." autocomplete="off">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>

        <!-- Mobile Search Icon -->
        <div class="nav-right">
            <button class="mobile-search-btn" onclick="window.scrollTo(0,0); document.getElementById('search-input-desktop').focus();"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main id="app">
        <!-- Dynamic Content Mounts Here -->
    </main>

    <div class="mobile-bottom-nav">
        <a href="#home" class="b-nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#home" class="b-nav-item"><i class="fas fa-film"></i><span>Movies</span></a>
        <a href="#home" class="b-nav-item"><i class="fas fa-tv"></i><span>TV Shows</span></a>
        <a href="#home" class="b-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <footer>
        <div class="footer-logo"><span class="logo-accent">U4</span>FILMS</div>
        <div class="footer-links">
            <a href="#home">Movies</a>
            <a href="#home">TV Shows</a>
            <a href="#home">Contact</a>
            <a href="#home">Policy</a>
        </div>
        <div>
            <p style="color: var(--accent); margin-bottom: 5px;">Disclaimer: This site does not store any files on our server.</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
