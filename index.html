<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4film - عالم الأفلام والمسلسلات</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
        }

        /* القائمة العلوية السينمائية */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 4%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #e50914;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        /* البانر الرئيسي - Hero */
        .hero {
            height: 55vh;
            background: linear-gradient(to top, #111 5%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 40px 4%;
        }

        .hero-title {
            font-size: 38px;
            margin-bottom: 12px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero-desc {
            font-size: 15px;
            max-width: 600px;
            color: #ccc;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        /* حاوية شبكة الأفلام */
        .main-container {
            padding: 20px 4%;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            border-right: 4px solid #e50914;
            padding-right: 10px;
            font-weight: 600;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background-color: #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        .movie-card:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2);
        }

        .movie-poster {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 10px;
        }

        .movie-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #aaa;
        }

        .rating {
            color: #ffb400;
            font-weight: bold;
        }

        /* نافذة العرض والـ Player المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal-content {
            background-color: #151515;
            width: 100%;
            max-width: 750px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }

        .close-modal {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            z-index: 2100;
            background: rgba(0,0,0,0.6);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .modal-details {
            padding: 20px;
        }

        .modal-movie-title {
            font-size: 22px;
            margin-bottom: 8px;
            color: #e50914;
        }

        .modal-movie-overview {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }

        /* أنيميشن لودر التحميل */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            grid-column: 1 / -1;
            padding: 50px 0;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .hero-title { font-size: 26px; }
            .hero { height: 45vh; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
            .movie-poster { height: 180px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">D4film</a>
    </header>

    <section class="hero">
        <h1 class="hero-title">تابع أفلامك المفضلة مجاناً</h1>
        <p class="hero-desc">استمتع بتجربة مشاهدة فريدة لأقوى الأفلام العالمية والحصرية المترجمة بجودات متعددة تناسب اتصالك.</p>
    </section>

    <main class="main-container">
        <h2 class="section-title">الأفلام الأكثر رواجاً ومـشـاهدة</h2>
        <div class="movies-grid" id="moviesGrid">
            <div class="loader"><div class="spinner"></div></div>
        </div>
    </main>

    <div class="modal" id="movieModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <div class="modal-content">
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            <div class="modal-details">
                <h3 class="modal-movie-title" id="modalTitle">--</h3>
                <p class="modal-movie-overview" id="modalOverview">--</p>
            </div>
        </div>
    </div>

    <script>
        const moviesGrid = document.getElementById('moviesGrid');
        const movieModal = document.getElementById('movieModal');
        const closeModal = document.getElementById('closeModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const modalTitle = document.getElementById('modalTitle');
        const modalOverview = document.getElementById('modalOverview');

        // جلب الأفلام الرائجة من الـ Cloudflare Function المكتوبة بأمان
        function fetchTrendingContent() {
            // توجيه الطلب إلى الـ endpoint الصحيح مباشرة '/fetchmovies'
            fetch('/fetchmovies?endpoint=trending/movie/week&language=ar')
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(data => {
                    moviesGrid.innerHTML = ''; // إخفاء لودر التحميل
                    if (data.results && data.results.length > 0) {
                        renderMovies(data.results);
                    } else {
                        moviesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#888;">لا توجد بيانات متاحة حالياً.</p>';
                    }
                })
                .catch(error => {
                    console.error("Fetch Error:", error);
                    moviesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#e50914;">تعذر تحميل محتوى الأفلام. يرجى مراجعة الـ API Key في لوحة تحكم Cloudflare.</p>';
                });
        }

        // دالة بناء الكروت داخل الـ Grid
        function renderMovies(movies) {
            movies.forEach(movie => {
                if (!movie.poster_path) return; // تجاوز الأفلام بدون غلاف

                const card = document.createElement('div');
                card.className = 'movie-card';

                const poster = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                const title = movie.title || movie.name || 'عنوان غير متوفر';
                const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '0.0';
                const year = movie.release_date ? movie.release_date.split('-')[0] : '----';

                card.innerHTML = `
                    <img class="movie-poster" src="${poster}" alt="${title}" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-name">${title}</div>
                        <div class="movie-meta">
                            <span class="rating">★ ${rating}</span>
                            <span>${year}</span>
                        </div>
                    </div>
                `;

                // عند النقر يتم تمرير بيانات الفيلم وفتح الـ Player
                card.addEventListener('click', () => {
                    startStream(movie);
                });

                moviesGrid.appendChild(card);
            });
        }

        // تشغيل مشغل الفيديو وعرض التفاصيل لفيلم محدد
        function startStream(movie) {
            const title = movie.title || movie.name;
            modalTitle.textContent = title;
            modalOverview.textContent = movie.overview || 'لا تتوفر قصة أو تفاصيل لهذا العمل حالياً في TMDB.';
            
            // دمج المشغل: نقوم بتمرير الـ ID الخاص بالفيلم تلقائياً للسيرفر (مثال ديمو يوتيوب، قم بوضع رابط Vidfast هنا)
            // مثال: videoPlayer.src = `https://vidfast.co/embed/${movie.id}`;
            videoPlayer.src = `https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1`;
            
            movieModal.style.display = 'flex';
        }

        // إغلاق المودال وتنظيف السورس لإيقاف الصوت فوراً
        closeModal.addEventListener('click', () => {
            movieModal.style.display = 'none';
            videoPlayer.src = '';
        });

        window.addEventListener('click', (e) => {
            if (e.target === movieModal) {
                movieModal.style.display = 'none';
                videoPlayer.src = '';
            }
        });

        // بدء تشغيل دالة الجلب فور جاهزية الصفحة
        document.addEventListener('DOMContentLoaded', fetchTrendingContent);
    </script>
</body>
</html>
